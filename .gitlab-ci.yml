# ============================================================
# PARSPEL v2.9.0 — GitLab CI/CD Pipeline
# ============================================================
# Stages: install → build → test → android-build
# Gereksinimler: 1.1–1.9, 2.1–2.6, 6.3, 6.5, 7.4
# ============================================================

stages:
  - install
  - build
  - test
  - android-build

variables:
  NODE_VERSION: "20"
  GRADLE_USER_HOME: "$CI_PROJECT_DIR/.gradle"
  ANDROID_SDK_ROOT: "/opt/android/sdk"

# ── Cache Şablonları ─────────────────────────────────────────

.npm_cache: &npm_cache
  cache:
    - key:
        files:
          - package-lock.json
      paths:
        - node_modules/
        - .npm/
      policy: pull-push

.gradle_cache: &gradle_cache
  cache:
    - key:
        files:
          - android/app/build.gradle
          - android/build.gradle
          - android/variables.gradle
      paths:
        - .gradle/
        - $HOME/.gradle/caches/
        - $HOME/.gradle/wrapper/
      policy: pull-push

# ── Node.js Job Şablonu ──────────────────────────────────────

.node_job: &node_job
  image: node:20-alpine
  <<: *npm_cache

# ── Stage: install ───────────────────────────────────────────

install-deps:
  <<: *node_job
  stage: install
  script:
    - npm ci --cache .npm --prefer-offline
  artifacts:
    paths:
      - node_modules/
    expire_in: 1 hour

# ── Stage: build ─────────────────────────────────────────────

build-web:
  <<: *node_job
  stage: build
  dependencies:
    - install-deps
  before_script:
    # GitLab CI/CD Variables'dan .env dosyasını oluştur
    # Değişkenler GitLab → Settings → CI/CD → Variables'da tanımlanmalıdır
    - |
      cat > .env << EOF
      VITE_FIREBASE_API_KEY=${VITE_FIREBASE_API_KEY:-}
      VITE_FIREBASE_AUTH_DOMAIN=${VITE_FIREBASE_AUTH_DOMAIN:-}
      VITE_FIREBASE_PROJECT_ID=${VITE_FIREBASE_PROJECT_ID:-}
      VITE_FIREBASE_STORAGE_BUCKET=${VITE_FIREBASE_STORAGE_BUCKET:-}
      VITE_FIREBASE_MESSAGING_SENDER_ID=${VITE_FIREBASE_MESSAGING_SENDER_ID:-}
      VITE_FIREBASE_APP_ID=${VITE_FIREBASE_APP_ID:-}
      VITE_FIREBASE_DOC_PATH=${VITE_FIREBASE_DOC_PATH:-sync/main}
      VITE_FIREBASE_MEASUREMENT_ID=${VITE_FIREBASE_MEASUREMENT_ID:-}
      VITE_GEMINI_API_KEY=${VITE_GEMINI_API_KEY:-}
      EOF
  script:
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 hour

# ── Stage: test ──────────────────────────────────────────────

unit-tests:
  <<: *node_job
  stage: test
  dependencies:
    - install-deps
  script:
    - npm run test:run
  artifacts:
    when: always
    paths:
      - test-results/
    expire_in: 7 days

# ── Stage: android-build ─────────────────────────────────────

build-apk:
  stage: android-build
  # Java 21 + Android SDK 36 içeren image
  # Alternatif: reactnativecommunity/react-native-android:latest (Java 17 — uyumsuz)
  image: cimg/android:2024.01
  dependencies:
    - build-web
  <<: *gradle_cache
  before_script:
    # Android SDK lisanslarını otomatik kabul et
    - yes | sdkmanager --licenses || true
    # google-services.json dosyasını GitLab Variable'dan oluştur
    # GOOGLE_SERVICES_JSON → GitLab → Settings → CI/CD → Variables → File type
    - |
      if [ -n "$GOOGLE_SERVICES_JSON" ]; then
        cp "$GOOGLE_SERVICES_JSON" android/app/google-services.json
        echo "✅ google-services.json oluşturuldu — Push Notifications aktif"
      else
        echo "⚠️  Push Notifications devre dışı: GOOGLE_SERVICES_JSON tanımlanmamış"
      fi
    # .env dosyasını oluştur (web build için)
    - |
      cat > .env << EOF
      VITE_FIREBASE_API_KEY=${VITE_FIREBASE_API_KEY:-}
      VITE_FIREBASE_AUTH_DOMAIN=${VITE_FIREBASE_AUTH_DOMAIN:-}
      VITE_FIREBASE_PROJECT_ID=${VITE_FIREBASE_PROJECT_ID:-}
      VITE_FIREBASE_STORAGE_BUCKET=${VITE_FIREBASE_STORAGE_BUCKET:-}
      VITE_FIREBASE_MESSAGING_SENDER_ID=${VITE_FIREBASE_MESSAGING_SENDER_ID:-}
      VITE_FIREBASE_APP_ID=${VITE_FIREBASE_APP_ID:-}
      VITE_FIREBASE_DOC_PATH=${VITE_FIREBASE_DOC_PATH:-sync/main}
      VITE_GEMINI_API_KEY=${VITE_GEMINI_API_KEY:-}
      EOF
  script:
    # Node.js bağımlılıklarını yükle
    - npm ci --cache .npm --prefer-offline
    # Web build + Capacitor sync
    - npm run build
    - npx cap sync android
    # Android APK derle
    # versionCode: CI_PIPELINE_IID (her pipeline'da otomatik artar)
    - |
      cd android
      ./gradlew assembleDebug \
        -PversionCode=${CI_PIPELINE_IID:-1} \
        --no-daemon \
        --stacktrace
  artifacts:
    name: "parspel-debug-${CI_PIPELINE_IID}"
    paths:
      - android/app/build/outputs/apk/debug/*.apk
    expire_in: 7 days
    when: on_success
  only:
    - main
